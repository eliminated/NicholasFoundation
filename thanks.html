<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Message Sent — The Nicholas Foundation</title>
  <link rel="stylesheet" href="css/main.css" /><link rel="stylesheet" href="css/components.css" /><link rel="stylesheet" href="css/layout.css" /><link rel="stylesheet" href="css/animations.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F8EF7'/><text y='72' x='50' font-size='60' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='900'>N</text></svg>" />
  <style>
    .thanks-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8);
      background: var(--bg-primary);
    }
    .thanks-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: var(--sp-16) var(--sp-12);
      text-align: center;
      max-width: 520px;
      width: 100%;
      box-shadow: var(--shadow-lg), var(--shadow-glow-sm);
    }
    .thanks-icon {
      font-size: 4rem;
      margin-bottom: var(--sp-6);
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    .thanks-card h1 {
      font-size: var(--text-3xl);
      margin-bottom: var(--sp-4);
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .thanks-card p {
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: var(--sp-8);
    }
    .thanks-actions {
      display: flex;
      gap: var(--sp-3);
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="thanks-wrap">
    <div class="thanks-card reveal reveal-up">
      <span class="thanks-icon">✉️</span>
      <h1>Message Received!</h1>
      <p>
        Thank you for reaching out to The Nicholas Foundation.<br />
        We typically respond within <strong>24 hours</strong> on business days.
      </p>
      <div class="thanks-actions">
        <a href="index.html" class="btn btn-primary">Back to Home</a>
        <a href="products.html" class="btn btn-secondary">Explore Our Work</a>
      </div>
    </div>
  </div>
  <script src="js/main.js" defer></script>
</body>
</html>
