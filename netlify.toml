# ─────────────────────────────────────────────────────────────────────────────
# The Nicholas Foundation — Netlify Configuration
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # No build step — pure static HTML/CSS/JS
  publish = "."

# ─── Custom 404 ───────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# ─── Security Headers (applied to all pages) ─────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options              = "SAMEORIGIN"
    X-Content-Type-Options       = "nosniff"
    X-XSS-Protection             = "1; mode=block"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security    = "max-age=31536000; includeSubDomains; preload"

# ─── Long-lived cache for versioned assets ───────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# ─── No cache for HTML pages ─────────────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ─── Netlify Forms — enable form detection ───────────────────────────────────
# Forms in HTML with data-netlify="true" are automatically detected at deploy time.
# No additional configuration needed here.
